<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字人聊天页 · 第一版拉取预览</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: "Noto Serif SC","STKaiti","KaiTi","STSong",ui-serif,serif;
    overflow: hidden;
  }

  /* ══════════════ 页面基底 ══════════════ */
  .tourist-page {
    position: relative;
    width: 100%; height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    overflow: hidden;
    background: #1a1612;
    color: #f0ece5;
  }

  /* ══════════════ ① 背景层 ══════════════ */
  .scenic-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .scenic-bg-img {
    position: absolute; inset: 0;
    background: url('assets/bg-alt.jpg') center/cover no-repeat;
    filter: blur(10px) saturate(0.3) brightness(0.4);
    transform: scale(1.06);
  }
  .scenic-bg-overlay {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 35%, transparent 0%, rgba(20,16,10,0.55) 80%),
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(22,18,10,0.5) 0%, transparent 70%);
  }

  /* ══════════════ ② 顶栏 ══════════════ */
  .back-btn {
    position: absolute;
    top: 32px; left: 32px;
    z-index: 25;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 14px 28px;
    border: 1px solid rgba(255,250,242,0.11);
    border-radius: 999px;
    background: rgba(255,250,242,0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    color: rgba(232,228,219,0.55);
    font-family: inherit; font-size: 20px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.3s ease;
    outline: none;
  }
  .back-btn:hover {
    border-color: rgba(255,250,242,0.19);
    background: rgba(255,255,255,0.09);
    color: rgba(232,228,219,0.85);
  }
  .back-arrow { display: inline-block; transition: transform 0.3s ease; }
  .back-btn:hover .back-arrow { transform: translateX(-3px); }
  .back-btn:focus-visible { outline: 2px solid #d9a441; outline-offset: 3px; }

  .top-right {
    position: absolute;
    top: 32px; right: 32px;
    z-index: 20;
    display: flex; flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .top-brand {
    color: rgba(232,228,219,0.88);
    font-family: "STKaiti","KaiTi","STSong",serif;
    font-size: clamp(24px, 2.8vw, 40px);
    font-weight: 400;
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px rgba(217,164,65,0.1);
    line-height: 1.2;
  }
  .top-status-row {
    display: flex; flex-direction: column; gap: 5px;
  }
  .status-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 16px; font-weight: 400;
    letter-spacing: 0.06em;
    color: rgba(232,228,219,0.55);
    font-family: system-ui, sans-serif;
  }
  .status-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot--ready  { background: #d9a441; box-shadow: 0 0 4px rgba(217,164,65,0.5); }
  .status-dot--warm   { background: #e8a840; box-shadow: 0 0 4px rgba(232,168,64,0.5); animation: dot-pulse 1.6s ease-in-out infinite; }
  .status-dot--live   { background: #5ec9a4; box-shadow: 0 0 4px rgba(94,201,164,0.5); }
  .status-dot--weather { background: #6bb8e8; box-shadow: 0 0 4px rgba(107,184,232,0.5); }
  @keyframes dot-pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }

  /* ══════════════ ③ 主舞台: 三栏 Grid ══════════════ */
  .tourist-stage {
    position: relative; z-index: 10;
    flex: 1; min-height: 0;
    display: grid;
    grid-template-columns: minmax(160px, 340px) 1fr minmax(160px, 340px);
    gap: 12px;
    align-items: stretch;
    padding: 20px 20px 0;
    margin-top: 0;
  }

  /* ── 左侧对话卡片 (绝对定位) ── */
  .side-card {
    position: absolute;
    left: 50px; bottom: 108px;
    z-index: 15;
    width: 480px; height: 520px;
    background: rgba(13,12,10,0.68);
    border: 1px solid rgba(255,250,242,0.09);
    border-radius: 16px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .side-card-head {
    flex-shrink: 0;
    position: relative;
  }
  .side-card-tabs {
    display: flex;
  }
  .side-card-tab {
    flex: 1;
    padding: 7px 0;
    border: none;
    background: transparent;
    color: rgba(232,228,219,0.35);
    font-family: inherit; font-size: 18px;
    font-weight: 600; letter-spacing: 0.06em;
    cursor: pointer;
    transition: color 0.25s ease;
    position: relative;
  }
  .side-card-tab.active {
    color: rgba(232,228,219,0.75);
  }
  .side-card-tab.active::after {
    content: "";
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 24px; height: 2px;
    border-radius: 1px;
    background: #d9a441;
  }
  .side-card-body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex; flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: rgba(232,228,219,0.15) transparent;
  }
  .side-card-body.hidden { display: none; }
  .side-card-body::-webkit-scrollbar {
    width: 4px;
  }
  .side-card-body::-webkit-scrollbar-track {
    background: transparent;
  }
  .side-card-body::-webkit-scrollbar-thumb {
    background: rgba(232,228,219,0.15);
    border-radius: 2px;
  }
  .side-card-body::-webkit-scrollbar-thumb:hover {
    background: rgba(217,164,65,0.25);
  }

  /* 消息气泡 */
  .msg-item {
    display: flex; flex-direction: column;
    max-width: 100%;
  }
  .msg-item.user {
    align-items: flex-end;
  }
  .msg-item.assistant {
    align-items: flex-start;
  }
  .msg-bubble {
    max-width: 90%;
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 18px; line-height: 1.55;
    letter-spacing: 0.03em;
    word-break: break-word;
  }
  .msg-item.user .msg-bubble {
    background: rgba(217,164,65,0.12);
    border: none;
    color: rgba(232,228,219,0.9);
    border-bottom-right-radius: 4px;
  }
  .msg-item.assistant .msg-bubble {
    background: rgba(232,228,219,0.05);
    border: none;
    color: rgba(232,228,219,0.85);
    border-bottom-left-radius: 4px;
  }
  /* 折叠态：问题收到回复后缩为一行 */
  .msg-item.user.collapsed .msg-bubble {
    max-height: 22px; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
    opacity: 0.45; font-size: 11px;
    padding: 3px 9px; border-radius: 6px;
    border-bottom-right-radius: 2px;
  }

  /* 来源引用标注 */
  .source-ref {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(217,164,65,0.22);
    color: #d9a441; font-size: 9px; font-weight: 700;
    font-family: system-ui, sans-serif;
    cursor: pointer; vertical-align: middle; margin: 0 2px;
    transition: background 0.2s ease;
  }
  .source-ref:hover { background: rgba(217,164,65,0.45); }

  /* 资料来源列表 */
  .source-list {
    list-style: none; padding: 0; margin: 0;
    display: grid; gap: 8px;
  }
  .source-item {
    padding: 10px;
    border: 1px solid rgba(232,228,219,0.08);
    border-radius: 8px;
    background: rgba(232,228,219,0.04);
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .source-item.highlight {
    border-color: rgba(217,164,65,0.5);
    background: rgba(217,164,65,0.08);
  }
  .source-card {
    padding: 10px;
    border: 1px solid rgba(232,228,219,0.08);
    border-radius: 8px;
    background: rgba(232,228,219,0.04);
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .source-card.highlight {
    border-color: rgba(217,164,65,0.5);
    background: rgba(217,164,65,0.08);
  }
  .source-item h4, .source-card h4 {
    display: flex; align-items: center; gap: 6px;
    margin: 0 0 5px;
    color: rgba(232,228,219,0.85); font-size: 12px; font-weight: 600;
  }
  .source-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(217,164,65,0.2);
    color: #d9a441; font-size: 10px; font-weight: 700;
    flex-shrink: 0;
  }
  .source-item p, .source-card p {
    margin: 0 0 3px;
    color: rgba(232,228,219,0.5); font-size: 11px; line-height: 1.5;
  }
  .source-meta {
    color: rgba(232,228,219,0.25); font-size: 10px;
  }

  /* 金色呼吸动画 — 当AI回复存在时 */
  .side-card.speaking {
    animation: card-breathe 3s ease-in-out infinite;
  }
  @keyframes card-breathe {
    0%, 100% { box-shadow: 0 0 0 rgba(217,164,65,0); }
    50% { box-shadow: 0 0 40px rgba(217,164,65,0.08); }
  }

  /* ══════════════ ④ 右侧快捷卡片 (绝对定位) ══════════════ */
  .right-card {
    position: absolute;
    right: 36px; top: 186px; bottom: 108px;
    z-index: 15;
    width: 450px; height: auto;    background: rgba(13,12,10,0.68);
    border: 1px solid rgba(255,250,242,0.09);
    border-radius: 16px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .right-card-head {
    flex-shrink: 0;
    position: relative;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(232,228,219,0.06);
    color: rgba(232,228,219,0.5);
    font-family: "STKaiti","KaiTi",serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.06em;
  }
  .right-card-body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex; flex-direction: column;
    gap: 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(232,228,219,0.15) transparent;
  }
  .right-card-body::-webkit-scrollbar { width: 4px; }
  .right-card-body::-webkit-scrollbar-track { background: transparent; }
  .right-card-body::-webkit-scrollbar-thumb { background: rgba(232,228,219,0.15); border-radius: 2px; }
  .right-card-body::-webkit-scrollbar-thumb:hover { background: rgba(217,164,65,0.25); }
  .service-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .service-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    background: rgba(232,228,219,0.05);
    color: rgba(232,228,219,0.65);
    font-family: inherit; font-size: 20px;
    text-align: left; cursor: pointer;
    transition: background 0.35s ease, color 0.35s ease;
  }
  .service-btn::before {
    content: "";
        width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .service-btn--scenic::before  { background: #d9a441; }
  .service-btn--route::before   { background: #5ec9a4; }
  .service-btn--photo::before   { background: #6bb8e8; }
  .service-btn--weather::before { background: #e8a840; }
  .service-btn:hover {
    background: rgba(217,164,65,0.1);
    color: rgba(232,228,219,0.85);
  }
  /* 二级选项占位 */
  .service-sub {
    display: none;
    margin: -2px 0 2px 14px;
  }
  .service-sub.open {
    display: flex; flex-direction: column; gap: 4px;
  }
  .service-sub-btn {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    background: rgba(232,228,219,0.03);
    color: rgba(232,228,219,0.4);
    font-family: inherit; font-size: 11px;
    text-align: left; cursor: pointer;
    transition: color 0.25s ease;
  }
  .service-sub-btn:hover { color: rgba(232,228,219,0.7); }

  /* ══════════════ 二级页面：景点卡片 ══════════════ */
  .level1-view {
    display: flex; flex: 1; min-height: 0; flex-direction: column;
  }
  .level1-view.hidden { display: none; }
  .level2-view {
    display: none;
    flex: 1; min-height: 0;
    flex-direction: column;
  }
  .level2-view.open { display: flex; }
  .l2-back-row {
    flex-shrink: 0;
    padding: 0 12px 8px;
  }
  .l2-back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 0;
    border: none; background: transparent;
    color: rgba(232,228,219,0.4);
    font-family: inherit; font-size: 16px; cursor: pointer;
    transition: color 0.25s ease;
  }
  .l2-back-btn:hover { color: #d9a441; }
  .l2-back-arrow { font-size: 18px; transition: transform 0.3s ease; }
  .l2-back-btn:hover .l2-back-arrow { transform: translateX(-2px); }

  .l2-scroll {
    flex: 1; min-height: 0;
    overflow-y: auto; padding: 0 12px 8px;
    display: flex; flex-direction: column; gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(232,228,219,0.1) transparent;
  }
  .l2-scroll::-webkit-scrollbar { width: 3px; }
  .l2-scroll::-webkit-scrollbar-thumb { background: rgba(232,228,219,0.1); border-radius: 2px; }
  .l2-scroll::-webkit-scrollbar-track { background: transparent; }

  .scenic-card {
    padding: 12px 14px;
    border: 1px solid rgba(232,228,219,0.10);
    border-radius: 6px;
    background: rgba(232,228,219,0.03);
    cursor: pointer;
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .scenic-card:hover {
    border-color: rgba(217,164,65,0.35);
    background: rgba(217,164,65,0.05);
  }
  .scenic-card h4 {
    display: flex; align-items: center; gap: 6px;
    margin: 0 0 5px;
    color: rgba(232,228,219,0.75); font-size: 19px; font-weight: 600;
  }
  .scenic-card .scenic-dot {
    width: 6px; height: 6px; border-radius: 2px;
    background: #d9a441; flex-shrink: 0;
  }
  .scenic-card p {
    margin: 0; color: rgba(232,228,219,0.4);
    font-size: 15px; line-height: 1.5;
  }

  /* ══════════════ ⑤ 中央: 数字人区域 ══════════════ */
  .chat-center {
    grid-column: 2; grid-row: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    min-height: 0;
  }
  .center-caption {
    margin-bottom: 12px; text-align: center;
    display: flex; align-items: baseline; justify-content: center; gap: 12px;
  }
  .center-caption .caption-kicker { font-size: 30px;
    color: #f8e7bb;
    font-family: "STKaiti","KaiTi",serif;
    font-size: 17px; font-weight: 700; letter-spacing: 0.1em;
    text-shadow: 0 0 20px rgba(217,164,65,0.15);
  }
  .caption-weather {
    color: rgba(232,228,219,0.28);
    font-family: system-ui, sans-serif;
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.04em;
  }
  .caption-kicker {
    color: #f8e7bb;
    font-family: "STKaiti","KaiTi",serif;
    font-size: 17px; font-weight: 700; letter-spacing: 0.1em;
    text-shadow: 0 0 20px rgba(217,164,65,0.15);
  }

  /* 顶部居中：数字人名称条 */
  .top-caption {
    position: absolute;
    top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    display: flex; align-items: baseline; justify-content: center; gap: 12px;
    white-space: nowrap;
  }
  .top-caption .caption-kicker { font-size: 30px; }
  .top-caption .caption-weather { color: rgba(232,228,219,0.25); }

  /* 景区人数状态灯 */
  .crowd-indicator {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,250,242,0.11);
    background: rgba(23,18,14,0.6);
    font-size: 17px; font-weight: 400;
    color: rgba(232,228,219,0.7);
    letter-spacing: 0.04em;
    font-family: system-ui, sans-serif;
    white-space: nowrap;
    cursor: default;
  }
  .crowd-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,250,242,0.16);
  }
  .crowd-indicator[data-level="green"] .crowd-dot { background: #5ec9a4; }
  .crowd-indicator[data-level="yellow"] .crowd-dot { background: #e8a840; }
  .crowd-indicator[data-level="red"] .crowd-dot { background: #d45a3a; }

  .avatar-stage {
    position: relative; z-index: 2;
    width: min(640px, 44vw);
    height: min(600px, 82vh);
    margin: 0 auto;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
  }
  .avatar-stage iframe {
    border: none; width: 100%; height: 100%;
  }
  .avatar-stage::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 140px;
    z-index: 3;
    pointer-events: none;
    background: linear-gradient(to bottom, transparent 0%, #1a1612 100%);
  }

  /* ══════════════ ⑥ 底部输入栏 (绝对定位) ══════════════ */
  .input-row {
    position: absolute;
    bottom: 36px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: min(700px, 88vw);
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .input-field {
    flex: 1;
    height: 64px;
    padding: 0 24px;
    border: 1px solid rgba(232,228,219,0.12);
    border-radius: 10px;
    background: rgba(23,18,14,0.78);
    color: rgba(232,228,219,0.82);
    font-family: inherit; font-size: 22px;
    letter-spacing: 0.03em;
    outline: none;
    transition: border-color 0.25s ease;
  }
  .input-field::placeholder {
    color: rgba(232,228,219,0.25);
  }
  .input-field:focus {
    border-color: rgba(217,164,65,0.35);
  }
  .voice-btn {
    flex-shrink: 0;
    width: auto;
    height: 64px;
    padding: 0 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(217,164,65,0.3);
    border-radius: 999px;
    background: rgba(217,164,65,0.14);
    color: #d9a441;
    font-family: inherit;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.3s ease;
    outline: none;
    white-space: nowrap;
  }
  .voice-btn:hover {
    border-color: rgba(217,164,65,0.45);
    background: rgba(217,164,65,0.2);
    box-shadow: 0 0 20px rgba(217,164,65,0.15);
  }
  .voice-btn:active { transform: scale(0.95); }
  .voice-btn:focus-visible { outline: 2px solid #d9a441; outline-offset: 3px; }
  .voice-btn.recording {
    border-color: #b84c3b;
    background: rgba(184,76,59,0.22);
    color: #f0c0c0;
    animation: voice-active 1.2s ease-in-out infinite;
  }
  @keyframes voice-active {
    0%,100% { box-shadow: 0 0 0 0 rgba(184,76,59,0.3); }
    50%     { box-shadow: 0 0 0 8px rgba(184,76,59,0); }
  }

  .image-btn {
    flex-shrink: 0;
    width: auto;
    height: 64px;
    padding: 0 24px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(94,201,164,0.25);
    border-radius: 999px;
    background: rgba(94,201,164,0.1);
    color: #5ec9a4;
    font-family: inherit;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.3s ease;
    outline: none;
    white-space: nowrap;
  }
  .image-btn:hover {
    border-color: rgba(94,201,164,0.45);
    background: rgba(94,201,164,0.2);
    box-shadow: 0 0 20px rgba(94,201,164,0.15);
  }
  .image-btn:active { transform: scale(0.95); }
  .image-btn:focus-visible { outline: 2px solid #5ec9a4; outline-offset: 3px; }

  /* ══════════════ ⑦ 移动端快捷入口 (桌面隐藏) ══════════════ */
  .mobile-chips-row {
    display: none;
    flex-wrap: wrap; gap: 8px;
    padding: 8px 12px;
    justify-content: center;
    z-index: 12;
  }
  .mobile-chip {
    padding: 6px 14px;
    border: 1px solid rgba(232,228,219,0.12);
    border-radius: 999px;
    background: rgba(13,12,10,0.6);
    color: rgba(232,228,219,0.55);
    font-family: inherit; font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s ease;
  }
  .mobile-chip:hover {
    border-color: rgba(217,164,65,0.35);
    color: rgba(232,228,219,0.8);
    background: rgba(217,164,65,0.08);
  }

  /* ══════════════ 响应式 ══════════════ */
  @media (max-width: 1300px) {
    .side-card, .right-card { width: 350px; height: 450px; right: 20px; bottom: 108px; 
    .side-card { left: 16px; bottom: 100px; }
    .right-card { right: 36px; top: 186px; bottom: 108px; }
    .tourist-stage {
      grid-template-columns: minmax(160px, 280px) 1fr minmax(160px, 280px);
      padding: 0 12px;
    }
    .avatar-stage {
      width: min(420px, 36vw);
      height: min(440px, 62vh);
    }
    .input-row {
      width: min(480px, 86vw);
    }
  }

  @media (max-width: 720px) {
    .tourist-page {
      overflow-y: auto;
      padding: 14px 10px;
    }
    .back-btn {
      top: 14px; left: 14px;
      padding: 7px 16px;
      font-size: 12px;
    }
    .top-right {
      top: 14px; right: 14px;
    }
    .top-brand {
      font-size: 16px;
    }
    .tourist-stage {
      display: flex; flex-direction: column;
      padding: 0;
      margin-top: 50px;
      gap: 12px;
      flex: none;
    }
    .side-card {
      position: relative;
      left: auto; bottom: auto;
      width: 100%; height: auto;
      min-height: 200px;
      order: 3;
    }
    .right-card {
      position: relative;
      right: auto; bottom: auto;
      width: 100%; height: auto;
      min-height: 200px;
      order: 4;
    }
    .chat-center {
      order: 1;
      padding: 0;
    }
    .avatar-stage {
      width: min(52vh, 78vw);
      height: min(360px, 52vh);
    }
    .input-row {
      position: relative;
      bottom: auto; left: auto; transform: none;
      width: calc(100% - 16px);
      gap: 8px;
      order: 2;
    }
    .mobile-chips-row {
      display: flex;
    }
    .voice-btn,
    .image-btn {
      padding: 0 14px; height: 44px; font-size: 13px;
    }
    /* 窄屏字体放大 */
    .msg-bubble     { font-size: 18px !important; padding: 12px 16px !important; }
    .service-btn    { font-size: 14px !important; padding: 12px 12px !important; }
    .side-card-tab   { font-size: 16px !important; }
    .scenic-card h4  { font-size: 20px !important; }
    .scenic-card p   { font-size: 16px !important; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">

<style>body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}</style>
</head>
<body>

<div class="tourist-page">
  <!-- ① 背景层 -->
  <div class="scenic-bg" aria-hidden="true">
    <div class="scenic-bg-img"></div>
    <div class="scenic-bg-overlay"></div>
  </div>

  <!-- ② 顶栏 -->
  <button class="back-btn" onclick="history.back()">
    <span class="back-arrow">←</span> 返回
  </button>
  <div class="top-right">
    <span class="top-brand">灵山智慧导览</span>
    <div class="top-status-row">
      <span class="status-item"><span class="status-dot status-dot--live"></span> 人物模型 · 可使用</span>
      <span class="status-item"><span class="status-dot status-dot--ready"></span> 语音模型 · 已就绪</span>
      <span class="status-item"><span class="status-dot status-dot--warm"></span> 语音识别 · 准备中</span>
    </div>
  </div>

  <!-- 顶部居中：数字人名称 -->
  <div class="top-caption">
    <span class="crowd-indicator" data-level="green" id="crowdStatus" aria-label="景区拥挤度">
      <span class="crowd-dot"></span>
      <span class="crowd-label">畅行</span>
    </span>
    <span class="caption-kicker">清岚 · AI 导览员</span>
    <span class="caption-weather">☀️ 22°C 晴</span>
  </div>

  <!-- ③ 主舞台: 三栏Grid + 绝对定位卡片 -->
  <div class="tourist-stage">

    <!-- 中央: 数字人 -->
    <div class="chat-center">
      <div class="avatar-stage">
        <iframe src="http://localhost:9999/avatar-3d-preview.html"></iframe>
      </div>
    </div>

    <!-- 输入栏 (DOM 位置: chat-center 之后, right-card 之前; 桌面绝对定位) -->
    <div class="input-row">
      <button class="image-btn" aria-label="拍照识景">拍照识景</button>
      <input
        type="text"
        class="input-field"
        placeholder="想问什么，告诉清岚…"
        aria-label="输入问题"
      />
      <button class="voice-btn" aria-label="语音提问">语音提问</button>
    </div>

    <!-- 左侧对话卡片 (绝对定位浮动) -->
    <div class="side-card" id="chatCard">
      <div class="side-card-head">
        <div class="side-card-tabs">
          <button class="side-card-tab active" data-tab="chat">对话</button>
          <button class="side-card-tab" data-tab="source">来源</button>
        </div>
      </div>
      <div class="side-card-body" id="chatCardBody"></div>
      <div class="side-card-body hidden" id="sourceCardBody">
        <ul class="source-list" id="sourceList"></ul>
      </div>
    </div>

    <!-- 右侧快捷卡片 (绝对定位浮动) -->
    <div class="right-card">
      <div class="right-card-head">快捷服务</div>
      <div class="right-card-body">
        <!-- 一级页面 -->
        <div class="level1-view" id="level1View">
          <div class="service-grid" id="serviceGrid">
            <!-- 一级：景点推荐 -->
            <button class="service-btn service-btn--scenic" data-service="scenic" id="btnScenic">景点推荐</button>
            <div class="service-sub" data-parent="scenic">
              <button class="service-sub-btn" data-scenic="灵山大佛">灵山大佛</button>
              <button class="service-sub-btn" data-scenic="九龙灌浴">九龙灌浴</button>
              <button class="service-sub-btn" data-scenic="灵山梵宫">灵山梵宫</button>
            </div>
            <!-- 一级：拍照点推荐 -->
            <button class="service-btn service-btn--photo" data-service="photo">拍照点推荐</button>
            <div class="service-sub" data-parent="photo">
              <button class="service-sub-btn">最佳机位</button>
              <button class="service-sub-btn">打卡墙</button>
            </div>
            <!-- 一级：路线推荐 -->
            <button class="service-btn service-btn--route" data-service="route">路线推荐</button>
            <div class="service-sub" data-parent="route">
              <button class="service-sub-btn">经典线路</button>
              <button class="service-sub-btn">深度游线</button>
              <button class="service-sub-btn">无障碍线路</button>
            </div>
            <!-- 一级：今日天气 -->
            <button class="service-btn service-btn--weather" data-service="weather">今日天气</button>
            <div class="service-sub" data-parent="weather">
              <button class="service-sub-btn">☀️ 22°C 晴</button>
            </div>
          </div>
        </div>

        <!-- 二级页面：景点卡片列表 -->
        <div class="level2-view" id="level2View">
          <div class="l2-back-row">
            <button class="l2-back-btn" id="btnBackLevel2">
              <span class="l2-back-arrow">←</span> 返回服务列表
            </button>
          </div>
          <div class="l2-scroll" id="l2Scroll">
            <div class="scenic-card" data-scenic="灵山大佛">
              <h4><span class="scenic-dot"></span>灵山大佛</h4>
              <p>88米青铜立佛 · 九龙灌浴 · 梵宫胜境</p>
            </div>
            <div class="scenic-card" data-scenic="九龙灌浴">
              <h4><span class="scenic-dot"></span>九龙灌浴</h4>
              <p>大型动态群雕 · 佛祖诞生再现 · 菩提大道</p>
            </div>
            <div class="scenic-card" data-scenic="灵山梵宫">
              <h4><span class="scenic-dot"></span>灵山梵宫</h4>
              <p>东西方艺术融合 · 佛教建筑杰作 · 珍宝馆</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ⑦ 移动端快捷入口 -->
  <div class="mobile-chips-row">
    <button class="mobile-chip">景点推荐</button>
    <button class="mobile-chip">路线推荐</button>
    <button class="mobile-chip">拍照识景</button>
  </div>
</div>

<script>
(function() {
  const chatBody    = document.getElementById('chatCardBody');
  const sourceBody  = document.getElementById('sourceCardBody');
  const sourceList  = document.getElementById('sourceList');
  const tabs        = document.querySelectorAll('.side-card-tab');

  /* ── 资料来源 ── */
  const sources = [
    { title: '灵山大佛', text: '灵山大佛通高88米，佛体79米，莲花座9米，是目前世界上最高的青铜立佛像。', meta: '景区官方资料 · 第3页' },
    { title: '九龙灌浴', text: '九龙灌浴位于灵山大佛前方，是灵山胜境核心景观之一，再现佛祖诞生场景。', meta: '景区官方资料 · 第7页' },
    { title: '灵山梵宫', text: '灵山梵宫是一座现代佛教建筑杰作，融合东西方艺术风格。', meta: '景区官方资料 · 第12页' },
  ];

  /* ── 对话（回答中含 <sup class="source-ref" data-src="N">①</sup>）── */
  const messages = [
    { role: 'user',      text: '灵山大佛有多高？' },
    { role: 'assistant', text: '据记载，灵山大佛通高88米<sup class="source-ref" data-src="0">①</sup>，佛体79米，莲花座9米，由1560块青铜壁板焊接而成<sup class="source-ref" data-src="1">②</sup>。是目前世界上最高的青铜立佛像。' },
    { role: 'user',      text: '铸造工艺是什么样的？' },
    { role: 'assistant', text: '采用锡青铜精密铸造<sup class="source-ref" data-src="0">①</sup>。内钢架外壁板，经打磨与化学着色处理。' },
  ];

  function renderChat() {
    let html = '';
    messages.forEach((m, i) => {
      if (m.role === 'user') {
        const hasReply = messages[i + 1] && messages[i + 1].role === 'assistant';
        html += `<div class="msg-item user${hasReply ? ' collapsed' : ''}">
          <div class="msg-bubble">${m.text}</div>
        </div>`;
      } else {
        html += `<div class="msg-item assistant">
          <div class="msg-bubble">${m.text}</div>
        </div>`;
      }
    });
    chatBody.innerHTML = html;

    /* 绑定来源引用点击 */
    chatBody.querySelectorAll('.source-ref').forEach(el => {
      el.addEventListener('click', function() {
        const idx = parseInt(this.dataset.src);
        switchTab('source');
        highlightSource(idx);
      });
    });
  }

  function renderSources() {
    sourceList.innerHTML = sources.map((s, i) => `
      <li class="source-card" data-src-idx="${i}">
        <h4><span class="source-num">${i + 1}</span>${s.title}</h4>
        <p>${s.text}</p>
        <span class="source-meta">${s.meta}</span>
      </li>
    `).join('');
  }

  function switchTab(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    chatBody.classList.toggle('hidden', name !== 'chat');
    sourceBody.classList.toggle('hidden', name !== 'source');
  }

  function highlightSource(idx) {
    renderSources();
    const card = sourceList.querySelector(`[data-src-idx="${idx}"]`);
    if (card) {
      card.classList.add('highlight');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(() => card.classList.remove('highlight'), 2500);
    }
  }

  tabs.forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

  /* ── 快捷服务二级菜单手风琴 ── */
  document.querySelectorAll('.service-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      // 「景点推荐」→ 切换到二级页面
      if (btn.dataset.service === 'scenic') {
        document.getElementById('level1View').classList.add('hidden');
        document.getElementById('level2View').classList.add('open');
        return;
      }
      const sub = document.querySelector(`.service-sub[data-parent="${btn.dataset.service}"]`);
      if (!sub) return;
      const wasOpen = sub.classList.contains('open');
      document.querySelectorAll('.service-sub.open').forEach(s => s.classList.remove('open'));
      if (!wasOpen) sub.classList.add('open');
    });
  });

  /* ── 景区卡片点击 → 触发左侧讲解 + 游览建议 ── */
  /*
   * 【后端接口约定】
   * 当用户点击某个景区卡片 (data-scenic="景区名") 时，
   * 前端应调用 GET /api/explain?scenic=景区名
   * 后端返回 JSON:
   * {
   *   "name": "灵山大佛",
   *   "explanation": "灵山大佛通高88米...",
   *   "suggestions": ["建议游览时间2小时", "最佳拍照点在九龙灌浴广场", "推荐乘坐电瓶车游览"],
   *   "sources": [{ "title": "景区官方资料", "text": "...", "meta": "第3页" }]
   * }
   * 前端拿到 explanation 后调用 pushMessage('assistant', explanation) 渲染到左侧对话区。
   */
  document.querySelectorAll('.scenic-card').forEach(card => {
    card.addEventListener('click', () => {
      const name = card.dataset.scenic;
      // --- Mock：模拟后端返回 ---
      const mockExplanation = {
        '灵山大佛': '灵山大佛通高88米，佛体79米，莲花座9米，由1560块青铜壁板拼装焊接而成。建议早晨9点前抵达，避开人流高峰；游览时间约1.5小时；最佳拍照点位于降魔浮雕广场。',
        '九龙灌浴': '九龙灌浴是灵山胜境的大型动态群雕，再现佛祖诞生场景。每天定时表演，建议提前10分钟占位；表演时长约15分钟；搭配菩提大道步行体验最佳。',
        '灵山梵宫': '灵山梵宫融合东西方佛教建筑艺术，内部珍宝馆藏大量佛教文物。建议预留1小时以上参观；注意殿内禁止拍照；每周一珍宝馆闭馆维护。',
      };
      const text = mockExplanation[name] || `关于「${name}」的详细介绍将由导游为您呈现。`;
      // 推入对话
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg-item user collapsed';
      msgDiv.innerHTML = `<div class="msg-bubble">请介绍${name}</div>`;
      document.getElementById('chatCardBody').appendChild(msgDiv);
      const replyDiv = document.createElement('div');
      replyDiv.className = 'msg-item assistant';
      replyDiv.innerHTML = `<div class="msg-bubble">${text}</div>`;
      document.getElementById('chatCardBody').appendChild(replyDiv);
      document.getElementById('chatCardBody').scrollTop = document.getElementById('chatCardBody').scrollHeight;
      // 状态呼吸光
      document.getElementById('chatCard').classList.add('speaking');

      // 返回一级页面
      document.getElementById('level2View').classList.remove('open');
      document.getElementById('level1View').classList.remove('hidden');
    });
  });

  /* ── 返回按钮：二级 → 一级 ── */
  document.getElementById('btnBackLevel2').addEventListener('click', () => {
    document.getElementById('level2View').classList.remove('open');
    document.getElementById('level1View').classList.remove('hidden');
  });

  renderChat();
  renderSources();

  /* ── 状态感知：有AI回复时添加 speaking 呼吸光效 ── */
  const sideCard = document.getElementById('chatCard');
  const hasAssistant = messages.some(m => m.role === 'assistant');
  if (hasAssistant) {
    sideCard.classList.add('speaking');
  } else {
    sideCard.classList.remove('speaking');
  }
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字人 3D 预览</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  canvas { display: block; }
  .loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #94a3b8; font-size: 14px; font-family: sans-serif;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">

<style>body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}</style>
</head>
<body>
<div class="loading" id="loading">3D 数字人加载中...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.4/+esm"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

const loadingEl = document.getElementById('loading');

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ── Scene ──
const scene = new THREE.Scene();
scene.background = null;
scene.fog = new THREE.FogExp2(0x0f172a, 0.0001);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(20, window.innerWidth / window.innerHeight, 0.5, 20);
camera.position.set(0, 0.55, 8.0);
camera.lookAt(0, 0.35, 0);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0x404060, 0.6));
const key = new THREE.DirectionalLight(0xffeedd, 2.2);
key.position.set(3, 2, 5);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8899cc, 0.7);
fill.position.set(-2, 0.5, 2);
scene.add(fill);
const rim = new THREE.PointLight(0xff9966, 1.5, 8);
rim.position.set(0, 2.5, -2);
scene.add(rim);

// ── Particles ──
const particleCount = 120;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 6;
  positions[i * 3 + 1] = Math.random() * 5 - 0.5;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 5;
  colors[i * 3] = 0.2 + Math.random() * 0.3;
  colors[i * 3 + 1] = 0.3 + Math.random() * 0.5;
  colors[i * 3 + 2] = 0.5 + Math.random() * 0.5;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
const particleMat = new THREE.PointsMaterial({
  size: 0.025, vertexColors: true, transparent: true, opacity: 0.6,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ── Load VRM ──
const loader = new GLTFLoader();
loader.register((parser) => new VRMLoaderPlugin(parser));

let vrm;
let animId;
let blinkTimer = 0;
let nextBlink = 2;
let blinkTimeout;

try {
  const modelUrl = 'models/hanfu.vrm';
  loadingEl.textContent = '正在下载数字人模型...';
  
  const gltf = await loader.loadAsync(modelUrl);
  vrm = gltf.userData.vrm;
  
  if (!vrm) throw new Error('VRM 数据未找到');
  
  loadingEl.textContent = '正在初始化...';
  
  VRMUtils.rotateVRM0(vrm);
  VRMUtils.removeUnnecessaryVertices(vrm.scene);
  
  // Normalize size
  const box = new THREE.Box3().setFromObject(vrm.scene);
  const size = new THREE.Vector3(); box.getSize(size);
  const targetHeight = 4.2;
  const scale = targetHeight / Math.max(size.y, 0.001);
  vrm.scene.scale.setScalar(scale);
  
  box.setFromObject(vrm.scene);
  const center = new THREE.Vector3(); box.getCenter(center);
  vrm.scene.position.x -= center.x;
  vrm.scene.position.z -= center.z;
  vrm.scene.position.y += -box.min.y - 3.1;
  
  // Natural pose
  const leftArm = vrm.humanoid?.getNormalizedBoneNode('leftUpperArm');
  const rightArm = vrm.humanoid?.getNormalizedBoneNode('rightUpperArm');
  if (leftArm) leftArm.rotation.z = -1.18;
  if (rightArm) rightArm.rotation.z = 1.18;
  
  scene.add(vrm.scene);
  
  // LookAt target
  const lookAtTarget = new THREE.Object3D();
  lookAtTarget.position.set(0, 0.9, 5.5);
  scene.add(lookAtTarget);
  if (vrm.lookAt) vrm.lookAt.target = lookAtTarget;
  
  vrm.scene.updateMatrixWorld(true);
  if (vrm.springBoneManager) vrm.springBoneManager.reset();
  
  loadingEl.style.display = 'none';
  
  // ── Animation loop ──
  const timer = new THREE.Clock();
  function animate() {
    animId = requestAnimationFrame(animate);
    const dt = Math.min(timer.getDelta(), 0.1);
    const t = performance.now() * 0.001;
    
    // Idle sway
    vrm.scene.rotation.x = Math.sin(t * 0.5) * 0.02;
    vrm.scene.rotation.y = Math.sin(t * 0.7) * 0.03;
    lookAtTarget.position.x = Math.sin(t * 0.28) * 0.18;
    lookAtTarget.position.y = 0.92 + Math.sin(t * 0.19) * 0.08;
    
    // Blink
    blinkTimer += dt;
    if (blinkTimer > nextBlink) {
      vrm.expressionManager?.setValue('blink', 1);
      clearTimeout(blinkTimeout);
      blinkTimeout = setTimeout(() => {
        vrm.expressionManager?.setValue('blink', 0);
      }, 100);
      blinkTimer = 0;
      nextBlink = 2 + Math.random() * 3;
    }
    
    // Particles
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < pos.length / 3; i++) {
      pos[i * 3 + 1] += 0.001 * dt;
      if (pos[i * 3 + 1] > 3.5) pos[i * 3 + 1] = -1.5;
    }
    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y += dt * 0.03;
    
    vrm.update(dt);
    renderer.render(scene, camera);
  }
  animate();
  
  // ── Resize ──
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
  
  console.log('✅ 数字人加载完成');
  
} catch (err) {
  loadingEl.textContent = '模型加载失败: ' + (err.message || '未知错误');
  loadingEl.style.color = '#fca5a5';
  console.error(err);
}
</script>
</body>
</html>

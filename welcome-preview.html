<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游客欢迎页 · 设计预览</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:   #d9a441;
    --gold-dim: rgba(217,164,65,0.5);
    --glass-bg:  rgba(255,250,242,0.07);
    --glass-bd:  rgba(255,250,242,0.11);
    --glass-bd-hv: rgba(255,250,242,0.19);
  }

  html, body {
    height: 100%;
    font-family: "Noto Serif SC", "STKaiti", "KaiTi", "STSong", ui-serif, serif;
    overflow: hidden;
  }

  /* ═══════════ 第一层：模糊背景 ═══════════ */
  .page {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    color: #f0ece5;
    background: #1a1612;
  }

  .bg-img {
    position: absolute;
    inset: 0;
    background: url('assets/bg-alt.jpg') center / cover no-repeat;
    filter: blur(8px) saturate(0.4) brightness(0.55);
    transform: scale(1.05);
  }

  .bg-veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 40% at 50% 40%, transparent 0%, rgba(20,16,10,0.55) 80%),
      radial-gradient(ellipse 70% 60% at 50% 100%, rgba(20,16,8,0.5) 0%, transparent 70%);
  }

  /* ═══════════ 第二层：数字人（居中，占主体视口） ═══════════ */
  .avatar-layer {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* 数字人容器 */
  .avatar-frame {
    position: relative;
    width: min(85vh, 98vw);
    aspect-ratio: 16 / 21;
    max-height: 92vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-frame iframe {
    border: none;
    width: 100%;
    height: 100%;
  }

  /* 数字人光环（弱化，不抢眼） */
  .avatar-aura {
    position: absolute;
    inset: -10% -20%;
    border-radius: 50%;
    background: radial-gradient(ellipse 45% 35% at 50% 55%, rgba(217,164,65,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ═══════════ 第三层：玻璃拟态内容浮层 ═══════════ */
  .content {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 10vh;
  }

  .content > * { pointer-events: auto; }

  /* 底部渐变遮罩（仅为按钮提供暗色背景，不挡数字人） */
  .content::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 28vh;
    background: linear-gradient(to top, rgba(20,16,10,0.65) 0%, rgba(20,16,10,0.2) 50%, transparent 100%);
    pointer-events: none;
    z-index: -1;
  }

  /* ── 左上回退按钮 ── */
  .back-btn {
    position: absolute;
    top: 28px;
    left: 28px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 20px;
    border: 1px solid var(--glass-bd);
    border-radius: 999px;
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    color: rgba(232,228,219,0.6);
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .back-btn:hover {
    border-color: var(--glass-bd-hv);
    background: rgba(255,255,255,0.09);
    color: rgba(232,228,219,0.85);
  }

  .back-arrow {
    display: inline-block;
    transition: transform 0.3s ease;
  }
  .back-btn:hover .back-arrow {
    transform: translateX(-3px);
  }

  /* ── 标题（上部，轻盈） ── */
  .hero-text {
    position: absolute;
    top: 10vh;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
  }

  .hero-title {
    font-size: clamp(28px, 3.5vw, 42px);
    font-weight: 400;
    letter-spacing: 0.16em;
    color: rgba(232,228,219,0.82);
    text-shadow: 0 0 60px rgba(217,164,65,0.15);
  }

  .hero-sub {
    margin-top: 8px;
    font-size: clamp(13px, 1.2vw, 16px);
    letter-spacing: 0.12em;
    color: rgba(217,164,65,0.55);
  }

  /* ── 玻璃拟态按钮（中下部） ── */
  .glass-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 44px;
    border: 1px solid rgba(217,164,65,0.18);
    border-radius: 999px;
    background: rgba(255,250,242,0.09);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: rgba(232,228,219,0.85);
    font-family: inherit;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 30px rgba(217,164,65,0.06);
  }

  .glass-btn:hover {
    border-color: rgba(217,164,65,0.3);
    background: rgba(255,250,242,0.13);
    color: rgba(232,228,219,0.95);
    box-shadow: 0 0 50px rgba(217,164,65,0.12), 0 0 80px rgba(217,164,65,0.05), inset 0 1px 0 rgba(255,250,242,0.07);
  }

  .glass-btn:active {
    transform: scale(0.97);
    background: rgba(255,250,242,0.05);
  }

  /* 按钮内箭头 */
  .btn-arrow {
    display: inline-block;
    transition: transform 0.35s ease;
  }
  .glass-btn:hover .btn-arrow {
    transform: translateX(3px);
  }

  /* ═══════════ 响应式 ═══════════ */
  @media (max-width: 860px) {
    .avatar-frame {
      width: min(60vh, 90vw);
      max-height: 72vh;
    }
    .hero-text { top: 6vh; }
    .content { padding-bottom: 8vh; }
    .glass-btn { padding: 14px 34px; font-size: 15px; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">

<style>body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}</style>
</head>
<body>

<div class="page">
  <!-- ══ 第一层：模糊场景背景 ══ -->
  <div class="bg-img"></div>
  <div class="bg-veil"></div>

  <!-- ══ 第二层：数字人（居中主体） ══ -->
  <div class="avatar-layer">
    <div class="avatar-aura"></div>
    <div class="avatar-frame">
      <iframe src="avatar-3d-preview.html"></iframe>
    </div>
  </div>

  <!-- ══ 第三层：玻璃拟态浮层 ══ -->
  <div class="content">
    <!-- 左上回退 -->
    <button class="back-btn" onclick="history.back()">
      <span class="back-arrow">←</span> 返回
    </button>

    <div class="hero-text">
      <h1 class="hero-title">灵山智慧导览</h1>
      <p class="hero-sub">清岚 · AI 数字人导览员</p>
    </div>

    <button class="glass-btn" onclick="location.href='#'">
      开启导览
      <span class="btn-arrow">→</span>
    </button>
  </div>
</div>

</body>
</html>
